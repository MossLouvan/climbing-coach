        Scout could not load project page. Typical pattern for LiDAR
        human-motion CVPR releases is a dataset-agreement / research-only
        license. Cannot be admitted until license text is confirmed.
    auditStatus: UNKNOWN_LICENSE
    resolutionAction: Re-load project page; extract license or request form.

  - sourceId: climbingcap-ascendmotion
