doNotUse:
  - sourceId: kinetics-700
    tier: D
    url: https://github.com/cvdfoundation/kinetics-dataset
    license:
      spdxId: Mixed-YouTube-Standard
      annotationsSpdxId: CC-BY-4.0
      notes: >-
        Underlying videos are "often standard YouTube license" per scout.
        Audit rule: do NOT approve YouTube videos unless explicitly CC.
        Kinetics-700 does not guarantee CC on its videos. Exclude from
        the public-only baseline.
    auditStatus: DO_NOT_USE
    reconsiderConditions: >-
      A CC-only subset, filtered per video and re-verified at sample
      time, may be reconsidered for Phase 2 under NEEDS_PERMISSION.

  - sourceId: activitynet
    tier: D
    url: http://activity-net.org/
    license:
      spdxId: Mixed-YouTube-Standard
      annotationsSpdxId: Research-Only
      notes: Same YouTube-license failure mode as Kinetics-700.
    auditStatus: DO_NOT_USE

