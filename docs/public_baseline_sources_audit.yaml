# Draft public-only baseline source list for YOLO-Pose training (Step 3).
#
# This file is a ROLL-UP of candidate sources and their audit status.
# It is NOT a schema-valid dataset manifest on its own -- the schema at
# scripts/training/dataset_manifest.schema.json expects ONE FILE PER SOURCE
# under data/manifests/<sourceId>.yaml with a signed license block. This
# file exists so a human can see every candidate + its status in one place
# and turn the approved rows into per-source manifests without re-doing the
# audit.
#
# Rules enforced by this draft:
#   * Every source has an auditStatus in the set documented in source_review.md.
#   * Only sources with auditStatus == APPROVED_FOR_BASELINE may be promoted
#     to a per-source manifest and fed into training.
#   * `license.verifiedBy` MUST be a human. It is intentionally left as null
#     here -- the audit is advisory, not authoritative.
#   * Attribution strings are ready to paste into the model card.
#
# Generated by: agent-2 (license-auditor), 2026-04-24.
# Human verifier: <unsigned>

schemaRef: scripts/training/dataset_manifest.schema.json
auditedOn: "2026-04-24"
auditedBy: "agent-2 (license-auditor, advisory only)"
policy:
  shipMode:
    # When CLIMBING_TRAINING_MODE=ship, dataset_sanity.py should reject
    # any source whose auditStatus is not APPROVED_FOR_BASELINE, and any
    # license.spdxId that starts with "CC-BY-NC-" or contains "-ND".
    rejectStatuses:
      - RESEARCH_ONLY
      - DO_NOT_USE
      - UNKNOWN_LICENSE
      - NEEDS_PERMISSION
    rejectSpdxPrefixes:
      - CC-BY-NC-
    rejectSpdxContains:
      - -ND
  researchMode:
    # When CLIMBING_TRAINING_MODE=research, RESEARCH_ONLY may be admitted
    # with an explicit opt-in per manifest.
    allowStatuses:
      - APPROVED_FOR_BASELINE
      - RESEARCH_ONLY

approvedForBaseline:
  - sourceId: coco-pose-2017
    sourceKind: public-dataset
    tier: C
    purpose: pretrain-warmstart
    url: https://cocodataset.org/
    ultralyticsConfig: https://docs.ultralytics.com/datasets/pose/coco/
    keypointFormat: COCO-17
    license:
      spdxId: CC-BY-4.0
      url: https://cocodataset.org/#termsofuse
      appliesTo: annotations
      imageLicenseNote: >-
        Image frames are Flickr-originated and retain per-image Flickr
        licensing. The COCO download pipeline is the canonical access
        path; do NOT re-host frames in this repo. Reference via DVC or
        the Ultralytics download script only.
      verifiedBy: null    # <-- human must fill
      verifiedAt: null    # <-- human must fill (ISO date)
      notes: >-
        Canonical training source for YOLO-Pose. Ultralytics coco-pose.yaml
        is turnkey. Include attribution string below in model card.
    attribution: |
      Microsoft COCO Consortium. "Common Objects in Context (COCO) 2017
      Keypoints." Licensed under CC BY 4.0. https://cocodataset.org/
    auditStatus: APPROVED_FOR_BASELINE
    auditRationale: >-
      Annotation license is an unambiguous SPDX id (CC-BY-4.0). Use is
      the canonical pretrain case. No redistribution of frames from this
      repo. Still requires a named human in license.verifiedBy before
      dataset_sanity.py will admit it.

  - sourceId: roboflow-vaf-bouldering-poses
    sourceKind: public-dataset
    tier: B
    purpose: climbing-sanity-eval  # too small to train on alone
    url: https://universe.roboflow.com/vaf/bouldering-poses
    keypointFormat: roboflow-native  # scout flagged COCO-17 mapping must be verified
    license:
      spdxId: CC-BY-4.0
      url: https://universe.roboflow.com/vaf/bouldering-poses
      appliesTo: images-and-annotations
      verifiedBy: null    # <-- human must fill
      verifiedAt: null    # <-- human must fill (ISO date)
      notes: >-
        Roboflow project page states CC BY 4.0 (per scout). Screenshot
        the license tag into data/manifests/attribution/ before signing;
        Roboflow license tags are per-project and can change silently.
        Verify the keypoint order maps cleanly to COCO-17 and record the
        mapping in a follow-up manifest field.
    attribution: |
      VAF. "Bouldering Poses" (Roboflow Universe). Licensed under CC BY 4.0.
      https://universe.roboflow.com/vaf/bouldering-poses
    approxFrameCount: 41
    climbingFraction: 1.0  # single class "Climber"
    auditStatus: APPROVED_FOR_BASELINE
    auditRationale: >-
      Clear SPDX id. Tiny set -- suitable for smoke tests / climbing-slice
      eval. Does not on its own satisfy the 15k-frame floor in spec §5.1.

needsPermission:
  - sourceId: posetrack21
    tier: C
    url: https://github.com/anDoer/PoseTrack21
    license:
      spdxId: Research-Agreement
      notes: >-
        Access requires a signed agreement emailed to the maintainer.
        Typically research-scoped; read commercial-use language carefully
        before any download.
    blocker: Signed agreement not in hand.
    auditStatus: NEEDS_PERMISSION

  - sourceId: youtube-cc-climbing
    tier: D
    url: https://www.youtube.com/results?search_query=climbing&sp=EgIwAQ%253D%253D
    license:
      spdxId: CC-BY-3.0
      notes: >-
        YouTube's only CC option is CC BY 3.0. Must be approved per video
        under data/manifests/self-labeled/<videoId>.yaml. Do NOT
        wildcard-approve YouTube. Filter-surfaced videos occasionally
        have incorrectly applied CC tags; re-verify at sample time.
    blocker: No specific video has been curated or verified yet.
    auditStatus: NEEDS_PERMISSION

  - sourceId: vimeo-cc-climbing
    tier: D
    url: https://vimeo.com/creativecommons
    license:
      spdxId: CC-BY-4.0  # or CC-BY-SA-4.0; NC/ND MUST be rejected
      notes: >-
        Per-video CC variant. dataset_sanity.py must reject CC-BY-NC-* and
        any -ND variant in ship mode. No specific videos approved yet.
    blocker: No specific video has been curated or verified yet.
    auditStatus: NEEDS_PERMISSION

  - sourceId: wikimedia-commons-climbing
    tier: D
    url: https://commons.wikimedia.org/wiki/Category:Climbing
    license:
      spdxId: CC-BY-4.0  # also CC-BY-SA-4.0 and public domain -- per file
      notes: >-
        Per-file license. CC-BY-SA requires a repo-wide policy decision
        about copyleft implications for released weights and derived
        datasets before admission. No file has been approved en masse.
    blocker: Per-file verification required; no files curated yet.
    auditStatus: NEEDS_PERMISSION

researchOnly:
  - sourceId: mpii-human-pose
    tier: C
    url: http://human-pose.mpi-inf.mpg.de/
    license:
      spdxId: Research-Only
      annotationsSpdxId: BSD-2-Clause   # simplified BSD for annotations
      notes: >-
        Images are research-only; commercial use not permitted. Do NOT
        train shipped weights on this dataset. Usable for ablations
        only, with dataset_sanity.py gated on CLIMBING_TRAINING_MODE.
    auditStatus: RESEARCH_ONLY

unknownLicense:
  - sourceId: aistpp
    tier: C
    url: https://google.github.io/aistplusplus_dataset/
    license:
      spdxId: UNKNOWN            # overall source
      annotationsSpdxId: CC-BY-4.0   # Google LLC annotations confirmed
      underlyingVideoLicenseUrl: https://aistdancedb.ongaaccel.jp/database_license/
      notes: >-
        Annotations are CC BY 4.0. Underlying AIST Dance Video Database
        has a separate license that the scout did not open. Training
        needs the video frames, so the annotation license alone is
        insufficient. Human must read the AIST database license and
        downgrade to APPROVED or RESEARCH_ONLY as appropriate.
    auditStatus: UNKNOWN_LICENSE
    resolutionAction: Read AIST Dance Video Database license; update entry.

  - sourceId: cimi4d
    tier: A
    url: http://www.lidarhumanmotion.net/cimi4d/
    paper: https://arxiv.org/abs/2303.17948
