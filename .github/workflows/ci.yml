name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --prefer-offline
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Test
        run: npm run test:ci
